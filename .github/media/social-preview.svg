<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" shape-rendering="geometricPrecision" role="img" aria-label="Polkadot Cookbook — Practical, tested recipes for building on Polkadot.">
  <!-- Generated. 1280×640 GitHub social preview.
       EVERGREEN — no version, no counts. Uploaded manually via
       Settings → Social preview; should not require re-upload on
       each release. -->
  <rect width="1280" height="640" fill="#000000"/>

  <!-- Pink slab -->
  <rect x="0" y="0" width="880" height="540" fill="#E6007A"/>
  <text x="80" y="240" font-family="ui-monospace, Menlo, Consolas, 'Courier New', monospace" font-size="116" font-weight="700" fill="#000000" letter-spacing="-2">POLKADOT</text>
  <text x="80" y="360" font-family="ui-monospace, Menlo, Consolas, 'Courier New', monospace" font-size="116" font-weight="700" fill="#000000" letter-spacing="-2">COOKBOOK</text>
  <rect x="80" y="388" width="580" height="5" fill="#000000"/>
  <text x="80" y="436" font-family="ui-monospace, Menlo, Consolas, 'Courier New', monospace" font-size="24" fill="#000000" opacity="0.9">Practical, tested recipes for building on Polkadot.</text>
  <g transform="translate(80, 476)">
    <circle cx="9" cy="9" r="9" fill="#000000"/>
    <circle cx="9" cy="9" r="4" fill="#E6007A"/>
    <text x="30" y="14" font-family="ui-monospace, Menlo, Consolas, 'Courier New', monospace" font-size="12" fill="#000000" opacity="0.65" letter-spacing="1.5">DOT CLI · scaffolder included</text>
  </g>

  <!-- Accent panel with network mark -->
  <rect x="880" y="0" width="400" height="540" fill="#000000"/>
  <g transform="translate(1080, 270)">
    <g stroke="#E6007A" stroke-width="1.5" opacity="0.3" fill="none">
      <line x1="0"     y1="-45"  x2="0"     y2="-78"/>
      <line x1="31.8"  y1="-31.8" x2="49.5" y2="-52"/>
      <line x1="45"    y1="0"     x2="70"   y2="0"/>
      <line x1="31.8"  y1="31.8"  x2="49.5" y2="52"/>
      <line x1="0"     y1="45"    x2="0"    y2="78"/>
      <line x1="-31.8" y1="31.8"  x2="-49.5" y2="52"/>
      <line x1="-45"   y1="0"     x2="-70"  y2="0"/>
      <line x1="-31.8" y1="-31.8" x2="-49.5" y2="-52"/>
    </g>
    <circle cx="0" cy="0" r="45" fill="#E6007A"/>
    <circle cx="0"     cy="-78"  r="10" fill="#E6007A"/>
    <circle cx="49.5"  cy="-52"  r="10" fill="#E6007A"/>
    <circle cx="70"    cy="0"    r="10" fill="#E6007A"/>
    <circle cx="49.5"  cy="52"   r="10" fill="#E6007A"/>
    <circle cx="0"     cy="78"   r="10" fill="#E6007A"/>
    <circle cx="-49.5" cy="52"   r="10" fill="#E6007A"/>
    <circle cx="-70"   cy="0"    r="10" fill="#E6007A"/>
    <circle cx="-49.5" cy="-52"  r="10" fill="#E6007A"/>
  </g>

  <!-- Footer -->
  <rect x="0" y="540" width="1280" height="100" fill="#FFFFFF"/>
  <text x="80" y="590" font-family="ui-monospace, Menlo, Consolas, 'Courier New', monospace" font-size="15" fill="#000000" opacity="0.85" letter-spacing="3">PALLETS · CONTRACTS · TRANSACTIONS · XCM · NETWORKS</text>
  <text x="80" y="618" font-family="ui-monospace, Menlo, Consolas, 'Courier New', monospace" font-size="12" fill="#000000" opacity="0.55">github.com/polkadot-developers/polkadot-cookbook</text>
  <text x="1200" y="618" font-family="ui-monospace, Menlo, Consolas, 'Courier New', monospace" font-size="11" fill="#000000" opacity="0.55" text-anchor="end">MIT / Apache-2.0</text>
</svg>
