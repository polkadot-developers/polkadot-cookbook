<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" shape-rendering="crispEdges" role="img" aria-label="Polkadot Cookbook — Practical, tested recipes for building on Polkadot.">
  <!-- Generated. 1280×640 GitHub social preview.
       EVERGREEN — no version, no counts. Uploaded manually via
       GitHub Settings → Social preview; should not require re-upload
       on each release. -->
  <rect width="1280" height="640" fill="#0D0D0D"/>

  <!-- Pink title slab -->
  <rect x="0" y="0" width="1280" height="460" fill="#E6007A"/>
  <text x="80" y="230" font-family="ui-monospace, Menlo, Consolas, 'Courier New', monospace" font-size="124" font-weight="700" fill="#07070A" letter-spacing="-2">POLKADOT</text>
  <text x="80" y="360" font-family="ui-monospace, Menlo, Consolas, 'Courier New', monospace" font-size="124" font-weight="700" fill="#07070A" letter-spacing="-2">COOKBOOK</text>
  <rect x="80" y="388" width="540" height="5" fill="#07070A"/>
  <text x="80" y="434" font-family="ui-monospace, Menlo, Consolas, 'Courier New', monospace" font-size="24" fill="#07070A" opacity="0.9">Practical, tested recipes for building on Polkadot.</text>

  <!-- Black footer -->
  <rect x="0" y="460" width="1280" height="180" fill="#07070A"/>
  <text x="80" y="530" font-family="ui-monospace, Menlo, Consolas, 'Courier New', monospace" font-size="16" fill="#F5F1E8" opacity="0.6" letter-spacing="3">PALLETS · CONTRACTS · TRANSACTIONS · XCM · NETWORKS</text>
  <text x="80" y="600" font-family="ui-monospace, Menlo, Consolas, 'Courier New', monospace" font-size="13" fill="#F5F1E8" opacity="0.45">github.com/polkadot-developers/polkadot-cookbook</text>
  <text x="1200" y="600" font-family="ui-monospace, Menlo, Consolas, 'Courier New', monospace" font-size="12" fill="#F5F1E8" opacity="0.45" text-anchor="end">MIT / Apache-2.0</text>
</svg>
