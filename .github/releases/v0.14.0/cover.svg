      <animate attributeName="opacity" values="0;0.85" dur="0.12s" begin="2.1s" fill="freeze"/>
      │ aaa7c7f » nft-hardhat test harness
    </text>
    <text x="774" y="88" font-family="ui-monospace, Menlo, Consolas, 'Courier New', monospace"
