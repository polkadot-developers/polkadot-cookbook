    <text x="320" y="484" font-size="12" opacity="0.9">polkadot-docs/chain-interactions <tspan opacity="0.5">████████████████████████████████████████████████</tspan>  12</text>
    <text x="320" y="502" font-size="12" opacity="0.9">.github/workflows                <tspan opacity="0.5">████████████████████</tspan>  5</text>
