    <text x="774" y="158" font-family="ui-monospace, Menlo, Consolas, 'Courier New', monospace"
          font-size="10" fill="#E6007A" opacity="0">
      <animate attributeName="opacity" values="0;0.95" dur="0.15s" begin="3.4s" fill="freeze"/>
