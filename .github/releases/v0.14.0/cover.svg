      ┌─┤ v0.13.0..v0.14.0  2026-04-09 → 04-13 ├────────┐
    </text>

    <!-- All 9 commits, chronological, oldest first -->
    <text x="774" y="46" font-family="ui-monospace, Menlo, Consolas, 'Courier New', monospace"
