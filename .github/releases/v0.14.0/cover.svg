         ≤13 commits → single column, all shown
         14-26      → two columns, all shown
         >26        → two columns w/ truncated subjects + "+N earlier" footer -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.3s" fill="freeze"/>
    <rect x="756" y="0" width="444" height="240" fill="#07070A"/>
    <rect x="764" y="8" width="428" height="224" fill="none" stroke="#F5F1E8" stroke-opacity="0.15" stroke-width="1"/>

