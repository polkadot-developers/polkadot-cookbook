name: Zero to Hero DApp

on:
  push:
    branches: [master]
    paths:
      - 'polkadot-docs/smart-contracts/zero-to-hero-dapp/**'
      - '!polkadot-docs/smart-contracts/zero-to-hero-dapp/README.md'
  pull_request:
    paths:
      - 'polkadot-docs/smart-contracts/zero-to-hero-dapp/**'
      - '!polkadot-docs/smart-contracts/zero-to-hero-dapp/README.md'
  workflow_dispatch:

jobs:
  test:
    # Guard: only run in the canonical repository to protect CI secrets
    if: github.repository == 'polkadot-developers/polkadot-cookbook'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Cache the upstream project's node_modules keyed on the test file.
      # When the pinned commit changes the test file will change, busting the cache.
      - name: Cache npm dependencies (upstream zero-to-hero-dapp)
        uses: actions/cache@v4
        with:
          path: |
            polkadot-docs/smart-contracts/zero-to-hero-dapp/.test-workspace/revm-hardhat-examples/zero-to-hero-dapp/storage-contract/node_modules
            polkadot-docs/smart-contracts/zero-to-hero-dapp/.test-workspace/revm-hardhat-examples/zero-to-hero-dapp/dapp/node_modules
            polkadot-docs/smart-contracts/zero-to-hero-dapp/.test-workspace/revm-hardhat-examples/zero-to-hero-dapp/dapp/.next/cache
          key: ${{ runner.os }}-zero-to-hero-dapp-npm-${{ hashFiles('polkadot-docs/smart-contracts/zero-to-hero-dapp/tests/docs.test.ts') }}

      # Install the Vitest wrapper's own dependencies (not the upstream project)
      - name: Install wrapper dependencies
        run: |
          cd polkadot-docs/smart-contracts/zero-to-hero-dapp
          npm ci

      # Run the full 4-phase test suite.
      - name: Run tests
        run: |
          cd polkadot-docs/smart-contracts/zero-to-hero-dapp
          npm test
        timeout-minutes: 20

  post-test:
    needs: test
    # Only file issues on master — not on every PR failure
    if: >
      github.repository == 'polkadot-developers/polkadot-cookbook' &&
      always() &&
      github.ref == 'refs/heads/master'
    uses: ./.github/workflows/post-cleanup.yml
    with:
      test_result: ${{ needs.test.result }}
      readme_path: 'polkadot-docs/smart-contracts/zero-to-hero-dapp/README.md'
      workflow_name: 'Zero to Hero DApp'
    permissions:
      contents: read
      issues: write
