name: Basic Contract with Hardhat

on:
  push:
    branches: [master]
    paths:
      - 'polkadot-docs/smart-contracts/basic-hardhat/**'
      - '!polkadot-docs/smart-contracts/basic-hardhat/README.md'
  pull_request:
    paths:
      - 'polkadot-docs/smart-contracts/basic-hardhat/**'
      - '!polkadot-docs/smart-contracts/basic-hardhat/README.md'
  workflow_dispatch:

jobs:
  test:
    # Guard: only run in the canonical repository to protect CI secrets
    if: github.repository == 'polkadot-developers/polkadot-cookbook'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Cache the upstream project's node_modules keyed on the test file.
      # When the pinned commit changes the test file will change, busting the cache.
      - name: Cache npm dependencies (upstream basic-hardhat)
        uses: actions/cache@v4
        with:
          path: |
            polkadot-docs/smart-contracts/basic-hardhat/.test-workspace/revm-hardhat-examples/basic-hardhat/node_modules
          key: ${{ runner.os }}-basic-hardhat-npm-${{ hashFiles('polkadot-docs/smart-contracts/basic-hardhat/tests/docs.test.ts') }}

      # Install the Vitest wrapper's own dependencies (not the Hardhat project)
      - name: Install wrapper dependencies
        run: |
          cd polkadot-docs/smart-contracts/basic-hardhat
          npm ci

      # Run the full 6-phase test suite.
      # PRIVATE_KEY maps to HARDHAT_VAR_PRIVATE_KEY inside the test so
      # Hardhat resolves vars.get('PRIVATE_KEY') without interactive prompts.
      - name: Run tests
        run: |
          cd polkadot-docs/smart-contracts/basic-hardhat
          npm test
        env:
          PRIVATE_KEY: ${{ secrets.TESTNET_PRIVATE_KEY }}
        timeout-minutes: 20

  post-test:
    needs: test
    # Only file issues on master — not on every PR failure
    if: >
      github.repository == 'polkadot-developers/polkadot-cookbook' &&
      always() &&
      github.ref == 'refs/heads/master'
    uses: ./.github/workflows/post-cleanup.yml
    with:
      test_result: ${{ needs.test.result }}
      readme_path: 'polkadot-docs/smart-contracts/basic-hardhat/README.md'
      workflow_name: 'Basic Contract with Hardhat'
    permissions:
      contents: read
      issues: write
